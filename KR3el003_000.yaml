body:
  text: 秘書源流是書稱禁書耶因禁故秘之也夫謂之曰秘閉之不欲傳也書則為大道之公也何以禁為不發於焚燒乎非耶稱之曰禁者出自朝廷宮禁之中也非使禁之而不行也蓋夫厭胡元久穢於中華我太祖高皇帝應運而生掃蕩腥膻除殘伐偽親冒矢石當時武將不愛命破釜沉舟缺槍之下沉舟破釜之後難免鋒鏑死傷瘡痍痛苦之厄又產異人如中山等以佐之隨傷輕重製方隨手應病其間實有起死回生之奇太祖不忍使民肝腦塗地用選無不屢驗者命採錄禁中為生民立命也時劉青田預軍國大計君臣一體亦得集之因上曾錄之故稱禁書而秘於家民間罕得傳寫今幸文武公後裔某者仰體今上如天之仁相與業青囊輩討論軒岐謀試昔秘奇方予因偶記之得一則計一日積月累謹成快焉此禁外傳之始惜非全書特豹文之數斑耳予遂因而酷好此恐後人將有覆酷之用乃筆之篇首開卷先入目使之為秘書不敢輕濫又使知是方所自源流雲云劉國師禁方一煎水洗二相度損處三拔伸四或用刀入骨五捺正六用黑龍散通七用風流散填瘡八夾縛九服藥十再洗十一再用黑龍散通十二或再用風流散填瘡口十三再夾縛十四仍前用服藥治之凡腦骨傷碎輕輕用手撙令平正若皮不破黑龍散敷貼若破用風流散填瘡口絹片包之不可見風著水恐成破傷風若水風入腦成破傷風則必破發頭疼不復可治在發內者須剪去發敷之凡頭骨跌碎陷下者用鮮虎脂四兩川芎五錢煎好酒入脂熱服即頭暈疼凡跌損小腹有瘀血作痛者用當歸五錢大黃五錢桃仁七粒紅花一撮用酒一碗同煎五更早服凡跌傷小便不通用小桐子樹根二兩切碎水酒各半煎服即通凡指頭斷者湊上須端正外用草藥水蠟燭草藥名內膜包裹完固候皮肉接上再用膏藥貼之收口生肌藥搽之凡喉頸刎斷者用銀絲縫合外用草藥敷之一日一換二次待皮肉相合再換膏藥貼之上生肌散內服上部湯藥凡刀斧損傷腸胃突出者用麻油藥和水浸濕青布搭在腸上候軟托邊拔入凡手腳傷骨出者皆有兩脛若一脛斷可兩脛俱斷決不可治矣凡傷損重者大概要拔伸捺正或取開捺正然後縛貼頓塗夾縛拔伸當相近本體損處不可別去一節骨上凡拔伸且要相度左右骨如何出有正拔伸者有斜拔伸者凡左右損處只相度骨縫仔細捻捺忖度便見大概要骨頭歸舊要撙捺皮相就入骨凡認損處只須揣摸骨頭平正便可見凡拔伸或用一人或用二三人看難易何如凡皮破骨出差舊拔伸不入撙捺相近爭一二分用快刀割些捺入骨不須差又人拔伸不入割肉自爛碎了可以入骨骨入之後用黑龍散貼瘡之四圍腫處留瘡口別用風流散填所用刀最要快利剜刀雕刀皆可凡骨碎斷須看本處平正何如大抵骨低是骨不曾傷損左右看骨方是損處要拔伸捺正用藥貼縛要平正方是凡夾縛三兩日冬四五日解開用熱藥水泡洗去舊藥時不可驚動損處仍用黑龍散敷夾縛大概傷重者方如此凡腫是血作用熱藥水洗用黑龍散敷貼凡傷重破者用風流散填更塗未破處用黑龍散貼須用杉木皮夾縛上令一人默含冷水一口噴之一驚自然收入然後用銀絲縫之上草藥內服口部藥凡大人小兒頂門打開碎者不可用草藥用止血散搽之即止內服末藥萬無一失凡上身初跌破血出用四味草藥敷上內服末藥加接骨丹三分凡中身初跌損先服末藥加接骨丹五分輕者七日後服煎藥重者十四日服前藥凡下身初跌損先服末藥同中治凡不時閃挫外貼膏藥而服末藥凡腦骨傷碎在頭腦骨上則可治在太陽穴乃是命處斷然不可治也又云治跌傷上法先將藥以末藥搽口外將傘紙貼以頭將傷上又將杉樹皮緊縛定凡肩甲骨出相度如何整治用椅當圈住脅仍以軟衣被綿罩使一人捉定兩人拔伸卻墜下手腕又著曲手著腕絹片縛之凡金井骨在脅之下有損不可夾縛須是捺正平令安貼平正用黑龍散貼絹片縛兩脅骨亦如之凡跨骨從臀上出者可用兩人挺定腿拔伸乃用腳捺入如跨骨從襠內出不可整理矣凡手骨出者看如何出若骨出向左則向右邊拔入骨向右出則向左凡拔伸捺正要軟物如絹片墊之凡皮里有碎骨只用黑龍散敷貼後來皮肉自爛碎骨必然自出來然後方愈凡骨打斷或筋斷有破處用風流散填塗卻用針線縫合其皮四圍用黑龍散貼之凡夾縛用杉樹皮開如指大四圍排均用繩帶緊縛必一二度仍須緊縛凡平處骨碎皮不破用藥貼縛夾大概看曲轉折之處不可夾縛恐愈後不能伸曲正用黑龍散貼帛片包縛使其曲轉屈伸便於患者自有知覺如指斷正用苧麻夾縛腿上用苧麻繩須如錢大凡貼藥用板子一片將皮紙或油紙以水調黑龍散攤勻在上然後卷之損處凡用杉木皮浸約如指大疏排均勻周匝用小繩三度緊縛三日一次如前淋洗換塗貼藥凡曲轉如手腕凹手指之類要曲伸轉動用藥貼以絹片包裹之後時時運動蓋能動則能伸能伸則自能曲也凡損一月尚可整理久則不能治矣凡損不可吃草藥吃則所損出骨不能如舊凡跌損腸肚中瘀血且服散藥四物湯之類凡跌損大小便不通未可便服接骨丹藥蓋接骨方藥大約濕熱又用酒調服反助燥結且服四物湯更看如何又服大成湯加木通如大小便未通又加朴硝通後卻服接骨丹藥凡傷重者未服損藥先服氣藥和勻氣散之類是也凡渾身無故損痛是風損當服風損散藥如排風湯之類凡服損藥不可吃生冷及牛羊諸魚若吃牛肉痛不可治凡服損藥湯散必須熱服熱便生血氣行易接骨耳凡用酒調藥不拘有灰無灰生熱皆可凡藥三四月煉不可合五月尤甚存散藥隨時旋丸凡收藥丸子末子並用罐收入廚內以火焙之凡損忌用火炙如用之則醫不得服藥不效矣慎之慎之諸藥惟小紅丸大活血丹最貴蓋其間用乳香沒藥貴重大活血丹內若無亦可有則更佳楓香可代乳香用凡所用藥材有外產者有土產者用各不同如當歸土與川不同丸子宜土末子宜川來道地者一傷腰笑不止及傷閃腰不能轉動宜服尋痛散加紅花蘇木嫩桑葉牛膝忍冬藤共為末入尋痛內服效一破傷風牙關緊急口閉手足拘攣諸藥不效此為風氣關塞萬否而不能通行四肢即用消風散治之一打傷重血氣上攻口眼鼻中皆出血者即用紅花破血散加木鱉子紫金皮服之效一他傷外血破打傷肚腹傷重陰血腸外脂膏腹內痛如不治其人日漸羸瘦如怯正服此藥大黃朴硝金砂虻蟲卷柏葉上㕮咀姜三片童便水各半煎七分服一傷血結大小便不通諸藥不能奏效即服此大黃木通紅花上咀片水煎此藥當通諸損應妙一刀傷破瘡口不合此藥洗之香附子厚朴羌活紫金皮共咀片入薑蔥煎水洗類數次瘡口即合矣一打傷破青紫腫如饅者用老茄通黃者六兩切作片干為末臨睡時酒吞三茶匙一夜即消之一破傷風用杏仁去皮留尖為末小麥面和井花水刷上即消一倒須箭射入骨痛抽箭扯帶筋出腫痛欲死服此有命也大黃黃連全蠍乳香劉寄奴側柏葉各等分上咀片姜三片水一碗蔥三根煎至七分服一治毒藥箭射入肉急服此名曰追毒神樓散更用另煎藥竹筒吸之否則毒氣入肉必死莫救追毒神樓散連翹知母甘草白芷獨活上咀姜三片箭吸筒藥夏枯草千層樓烏桕樹皮鐵骨稍如無不用血見愁山水牛上水二碗刮薄薄苦竹筒三五筒文武火煮令藥水干為度取筒緊吸瘡口上待筒自脫又著一個吸完筒毒盡出即服去風散及搽生肌散一治箭入皮肉用麻藥定整骨取出箭頭名曰昏昏散山黃花香附子川芎黃土上共為細末每服一錢五分酒調服以草烏自然汁解之或醋調冷水解之治火燎糞淬苦竹筌者或被苦竹槍殺傷有火毒走痛腫痛服諸藥不效此藥大效名曰無價千金散無價千金散木瓜殭蠶全蠍側柏葉川芎白芷防己黃連共咀片每服七錢姜三片蔥三根水酒各半鍾煎七分溫服以香辛散頻頻洗去瘡毒上生肌散一殺傷瘡口深者於及及散內加入大黃草烏搽瘡口上此二味為末用蜜調貼瘡口四圍住痛去舊血生新血瘡口燥生肌散不能入用此藥貼之其肉自生滿也一殺破肚腹腸出者治之已結口肚內作痛不能飲食此是攪了腸也缺治法一跌糞門膀胱大小便不通日輕夜重潮熱往來宜服五苓散一傷重麻藥內加血竭生磨若胸膈有血膨悶多服麻藥不知何麻藥一傷輕者不必用麻藥只加血竭服生肌散加減定式白芷新者小者去皮作極細末一兩一包名曰千金散乳香沒藥各二錢五分瘡口瘡痛加一錢血竭白芨或加歸尾作末入前藥內又能住痛生肌如瘡口乾用麻油調搽尋痛散治百般傷損折斷肢骨常常服之乳香沒藥木香川芎川歸茴香木瓜虎骨一兩燒酒淬自然銅酒淬草烏上共為細末每用服二茶匙姜酒調服一日二三服五通治傷重及血瘀歸肚攻作悶脹急宜灌之連服巴豆七粒去殼以油紙七重包打去油生薑一塊如腳指大切作二片中作一孔入豆在內細嚼吞之未宜飲食帶瀉五七次去盡腹中瘀血就將冷粥湯補之如不住用水洗口面手足即止秘傳葉保太仙授接骨奇方臨症口訣凡被殺腸破出者可效百不下死用真麻油搽醫人之手送腸入如腸出久被風吹脹幹不可入者用麻油搽腸待潤滑用手伴送入肚急須傷口捻住用線或銀絲縫好用收口止血藥敷仍以膏藥貼外少頃腹中作響聲乃腸復故位然腹之傷否目難見不待屎出難治雖小有針孔亦不可救藥試之法取好燒酒令傷人吃一小鐘或二三口醫人嗅聞傷處若作酒氣即腸破傷萬不可治切莫妄施湯藥自取庸凡之誚也凡人腳蓋骨乃另生者或跌打磕碎或脫出治之之法極難施巧合用物亦做成一箍以蓋骨大箍住蓋骨用長線織帶縛定護膝再縛愈日取箍凡割喉見者必驚惶多皆奔避束手待斃枉死多焉殊不知事勢雖凶死中可活於被傷之時不問氣食二喉急令人以手扶住其頭托湊喉管緊捻不令氣出急用大針穿銀絲隔寸許一縫合訖用收口藥敷膏藥貼外愈日銀系自脫出其人家銀系多或不備業此者當預置備以全好生之心耶凡從高墜下昏沉不蘇形如已死但未氣絕者俱可效治急進接骨丹薑蔥油酒調服若墜之時盡力叫喊聲聞遠近身上油汗如雨此內傷五臟萬不救一死在旦夕之間切勿貪利害名凡隨跌撲打傷損臃腫之處不肯令人著手摸看或腫硬難辨肉內骨損醫人用手緩緩捻腫處良久腫暫軟消如骨損肉內有聲醫者用左手仰掌把捉被傷之手挺直不可讓退恐畏疼不肯再伸直用右手施捻骨果碎用藥膏貼訖外再用做鞋硬荀箬層再外添用紙重包好以布織長帶纏扎如欲換藥解開照前扎縛倘止傷腫只用末藥方服膏貼如痛不可忍者服藥及膏藥各加乳香末藥好凡骨折刺出肉外折處兩頭必如利鋒須先用藥麻定然後用銼銼去兩頭尖頭按入用藥敷貼外荀箬數層如法扎縛再服湯散筋骨脈絡相生其骨自然堅固矣若因患者畏懼疼痛醫者畏難苟安不銼去尖鋒潦草按入皮肉患處正欲生長肌肉而一或勞動則尖芒復新肉又重作掀以致日久傷口不合常流清水或膿血頻仍是誰之過歟可不慎哉凡手腕出臼者醫人用左手仰掌托捻被傷手臂用右手拿住下節手近肘處一把拿定不可讓其縮退盡力一扯徐徐放就即入故位再服接骨丹外膏勤貼未有不效如肩臂脫臼令被傷者於低矮去處坐定自兩手指相叉抱膝上將膝借力著實一襯其手臂隨手直前輕輕一放兩手就入故位若假他人扯拽反受痛苦未必就入臂臼也凡肩脛之間其骨謂之天井骨此骨若折必一頭高蹺不相平服以膏貼之用紙數層鋪襯取軟施以薄薄杉板壓或用粉匝板以長布帶穿縛在腋下緊緊繫拴仍服接骨丹愈日任意挑負無害頭顱乃百骸之尊一身之主或被跌打顱裂骨陷有出白漿如髓者見者可畏多信為腦裂出其能生乎往往待斃者多矣籲特未加察耳非髓也髓外之漿也治如常法倍下落得打陷骨自起裂顱自合功用之妙有如是夫凡切人術者蓋亦察而知之全而生之也
